<body class="font-body-md text-on-background min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-container-margin py-xl">
<div class="w-full max-w-md bg-white rounded-[32px] shadow-[0_20px_50px_rgba(255,112,67,0.12)] p-lg md:p-xl border border-secondary-container/30">

</div>
<h1 class="font-display-lg text-display-lg text-on-background mb-xs">RasaRekomendasi</h1>
<p class="font-body-sm text-body-sm text-secondary text-center">Masak seru, rasa juara. Selamat datang kembali!</p>
</div>
<form class="space-y-md">
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant px-unit" for="email">EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all font-body-md placeholder:text-outline-variant" id="email" placeholder="nama@email.com" type="email"/>
</div>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center px-unit">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-bold text-label-bold text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Lupa Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary-container transition-all font-body-md placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full py-4 bg-primary-container text-white font-title-sm text-title-sm rounded-2xl shadow-lg shadow-primary-container/30 hover:scale-[1.02] active:scale-95 transition-all duration-200 mt-sm" type="submit">
                    Login
                </button>
</form>
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white px-md text-outline font-label-bold">Atau masuk dengan</span>
</div>
</div>
<div class="grid grid-cols-1 gap-md">
<button class="flex items-center justify-center gap-sm w-full py-4 bg-white border border-outline-variant rounded-2xl font-title-sm text-on-background hover:bg-surface-container-low transition-all active:scale-95">
<svg class="w-5 h-5" viewbox="0 0 24 24">

<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-secondary">
