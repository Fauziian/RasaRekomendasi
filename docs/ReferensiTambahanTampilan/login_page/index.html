<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RasaRekomendasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFF, #F9F9F9);
            color: transparent; /* Text is invisible in screenshot or there's just a blank space, I'll add text for accessibility */
            color: #333;
            font-weight: 700;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
            border: 1px solid #f0f0f0;
        }
        .login-btn:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            transform: none;
            background: #fff;
            color: var(--primary);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: var(--text-light);
            font-size: 12px;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #EAEAEA;
        }
        .divider::before { margin-right: .5em; }
        .divider::after { margin-left: .5em; }
        
        .google-btn {
            width: 100%;
            background: #fff;
            color: #333;
            border: 1px solid #EAEAEA;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .google-btn:hover {
            background: #FDFCF8;
            color: #333;
        }
        
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #A0A0A0;
        }
        .input-icon-wrapper .toggle-password {
            left: auto;
            right: 20px;
            cursor: pointer;
        }
        .form-control.with-icon {
            padding-left: 50px;
        }
    </style>
</head>
<body>

    <div class="auth-layout">
        <div class="auth-card">
            <div class="logo-icon" style="margin: 0 auto 20px; width: 60px; height: 60px; background: #fff; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center;">
               <!-- Empty box in screenshot -->
            </div>
            <h1>RasaRekomendasi</h1>
            <p>Masak seru, rasa juara. Selamat datang kembali!</p>

            <form action="../home_page/index.html">
                <div class="form-group" style="text-align: left;">
                    <label>EMAIL</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control with-icon" placeholder="nama@email.com" required>
                    </div>
                </div>

                <div class="form-group" style="text-align: left;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label>PASSWORD</label>
                        <a href="#" style="font-size: 12px; font-weight: 600;">Lupa Password?</a>
                    </div>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control with-icon" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>

                <button type="submit" class="btn login-btn">Masuk</button>
            </form>

            <div class="divider">ATAU MASUK DENGAN</div>

            <button class="btn google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="20">
                Google
            </button>

            <p style="margin-top: 30px; font-weight: 500;">
                Belum punya akun? <a href="../register_page/index.html" style="font-weight: 700;">Daftar Sekarang</a>
            </p>
        </div>
    </div>

    <footer>
        <div class="footer-brand">RasaRekomendasi</div>
        <p>&copy; 2024 RasaRekomendasi. Built for Gen Z Home Chefs.</p>
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Terms of Service</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Contact</a>
        </div>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
