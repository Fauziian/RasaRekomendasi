<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RasaRekomendasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-card {
            background: url('https://images.unsplash.com/photo-1490818387583-1b5f208115d7?q=80&w=600&auto=format&fit=crop') no-repeat top center;
            background-size: 100% 250px;
            padding-top: 80px;
            position: relative;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 250px;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 90%);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            z-index: 0;
        }
        .auth-card > * {
            position: relative;
            z-index: 1;
        }
        .auth-card h1 {
            color: var(--primary);
            font-size: 32px;
            margin-bottom: 5px;
            font-weight: 400;
        }
        .auth-card p {
            color: var(--text-dark);
            font-weight: 500;
        }
        .register-btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-container {
            display: flex;
            align-items: flex-start;
            text-align: left;
            gap: 10px;
            margin: 20px 0;
            font-size: 14px;
            font-weight: 500;
        }
        .checkbox-container input {
            margin-top: 4px;
        }
        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #333;
        }
        .form-control.with-icon { padding-left: 40px; border: 1px solid #e0e0e0; background: #fff;}
        .form-group label { text-transform: uppercase; font-size: 12px; font-weight: 700; color: #555; }
        
        .footer-logo {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="auth-layout">
        <div class="auth-card" style="margin-top: 40px;">
            <h1>Join the Kitchen</h1>
            <p>Start your flavor journey today</p>

            <form action="../home_page/index.html" style="margin-top: 30px;">
                <div class="form-group" style="text-align: left;">
                    <label><i class="fas fa-user"></i> FULL NAME</label>
                    <input type="text" class="form-control" placeholder="Indra Wijaya" required style="border: 1px solid #e0e0e0; background: #fff;">
                </div>

                <div class="form-group" style="text-align: left;">
                    <label><i class="fas fa-envelope"></i> EMAIL ADDRESS</label>
                    <input type="email" class="form-control" placeholder="indra@rasarekomendasi.com" required style="border: 1px solid #e0e0e0; background: #fff;">
                </div>

                <div class="grid-2" style="gap: 15px;">
                    <div class="form-group" style="text-align: left;">
                        <label><i class="fas fa-lock"></i> PASSWORD</label>
                        <input type="password" class="form-control" placeholder="••••••••" required style="border: 1px solid #e0e0e0; background: #fff;">
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label><i class="fas fa-check-circle"></i> CONFIRM</label>
                        <input type="password" class="form-control" placeholder="••••••••" required style="border: 1px solid #e0e0e0; background: #fff;">
                    </div>
                </div>

                <div class="checkbox-container">
                    <input type="checkbox" required id="terms">
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn register-btn">Create Account <i class="fas fa-chevron-right"></i></button>
            </form>

            <div class="divider" style="margin: 25px 0;">ALREADY A CHEF?</div>

            <p style="margin-top: 15px; font-weight: 500;">
                Already have an account? <a href="../login_page/index.html" style="font-weight: 700; color: #900;">Login here</a>
            </p>
        </div>
        
        <div class="footer-logo">
            <i class="fas fa-utensils"></i> RasaRekomendasi
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">About Us</a>
            <a href="#">Terms of Service</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Contact</a>
        </div>
        <p>&copy; 2024 RasaRekomendasi. Built for Gen Z Home Chefs.</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
